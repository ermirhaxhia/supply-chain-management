# ============================================================
# .github/workflows/scheduler.yml
# Ekzekuton simulimin çdo orë 06:00-22:00 (Europe/Tirane)
#
# SETUP i nevojshëm në GitHub:
#   Settings → Secrets → Actions → New repository secret:
#   - SUPABASE_URL
#   - SUPABASE_SERVICE_KEY
#   - API_KEY_MASTER
#   - FUEL_BASE_PRICE  (value: 185)
# ============================================================

name: Supply Chain Scheduler

on:
  schedule:
    # UTC+2 (Europe/Tirane) = UTC-2 orë
    # 06:00 Tiranë = 04:00 UTC
    # 22:00 Tiranë = 20:00 UTC
    - cron: "0 4 * * *"   # 06:00 Tiranë
    - cron: "0 5 * * *"   # 07:00 Tiranë
    - cron: "0 6 * * *"   # 08:00 Tiranë
    - cron: "0 7 * * *"   # 09:00 Tiranë
    - cron: "0 8 * * *"   # 10:00 Tiranë
    - cron: "0 9 * * *"   # 11:00 Tiranë
    - cron: "0 10 * * *"  # 12:00 Tiranë
    - cron: "0 11 * * *"  # 13:00 Tiranë
    - cron: "0 12 * * *"  # 14:00 Tiranë
    - cron: "0 13 * * *"  # 15:00 Tiranë
    - cron: "0 14 * * *"  # 16:00 Tiranë
    - cron: "0 15 * * *"  # 17:00 Tiranë
    - cron: "0 16 * * *"  # 18:00 Tiranë
    - cron: "0 17 * * *"  # 19:00 Tiranë
    - cron: "0 18 * * *"  # 20:00 Tiranë
    - cron: "0 19 * * *"  # 21:00 Tiranë
    - cron: "0 20 * * *"  # 22:00 Tiranë

  # Mundëso run manual nga GitHub UI (për test)
  workflow_dispatch:

jobs:
  simulate:
    name: "Simulation Tick"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run simulation tick
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          API_KEY_MASTER:       ${{ secrets.API_KEY_MASTER }}
          FUEL_BASE_PRICE:      ${{ secrets.FUEL_BASE_PRICE }}
        run: python scheduler/scheduler.py --manual