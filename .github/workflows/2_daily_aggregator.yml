name: 📊 2. Daily Aggregation (23:55)

on:
  schedule:
    # Ekzekutohet çdo natë në orën 23:55 (Koha e Tiranës -> 21:55 UTC)
    - cron: "55 21 * * *"
  workflow_dispatch:

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Daily Aggregation
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        # Këtu thërrasim komandën specifike për llogaritë ditore
        run: python scheduler/scheduler.py --job daily